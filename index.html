<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Comic Sans MS', 'Trebuchet MS', sans-serif;

    margin: 0;

  h1 {
    text-align: center;

  }

    text-align: center;
    color: #34495e;
    font-size: 1.2em;

  }
  .container {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    transition: transform 0.2s;
    border: 3px solid #fff;
  }
  .card:hover { transform: translateY(-2px); }
  .row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .content { flex: 1; min-width: 0; }
  .num {
    display: inline-block;
    background: #ff6b6b;
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 0.9em;
    margin-right: 10px;
  }
  .hints {
    display: inline;
    color: #2c3e50;
    font-size: 1em;
    line-height: 1.5;
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .hints li {
    display: inline;
  }
  .hints li:not(:last-child)::after {
    content: " • ";
    color: #bbb;
    font-weight: bold;
  }
  button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    flex-shrink: 0;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.2s;
  }
  button:hover { transform: scale(1.03); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
  .answer {
    display: none;
    margin-top: 12px;
    padding: 12px;
    background: #d4edda;
    border-left: 5px solid #28a745;
    border-radius: 8px;
    font-size: 1.1em;
    font-weight: bold;
    color: #155724;
    text-align: center;
  }
  .answer.show { display: block; animation: pop 0.3s ease-out; }
  @keyframes pop {
    0% { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .emoji { font-size: 1.5em; }
  .answer img {
    display: block;
    max-width: 100%;
    max-height: 200px;
    margin: 10px auto 0;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .loading {
    font-size: 0.85em;
    color: #155724;
    font-style: italic;
    margin-top: 6px;
  }
  .credit {
    font-size: 0.7em;
    color: #666;
    text-align: center;
    margin-top: 4px;
    font-weight: normal;
  }
  footer {
    text-align: center;
    margin-top: 40px;
    color: #555;
    font-size: 0.9em;
  }
</style>

const quiz = document.getElementById('quiz');
questions.forEach((q, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="row">
      <div class="content">
        <span class="num">Q${i + 1}</span>
        <ul class="hints">
          <li>${q.hints[0]}</li>
          <li>${q.hints[1]}</li>
          <li>${q.hints[2]}</li>
        </ul>
      </div>
      <button onclick="reveal(${i})">🔍 Reveal</button>
    </div>
    <div class="answer" id="answer-${i}">
      <div>It's a <span class="emoji">${q.answer}</span>!</div>
      <div class="image-slot" id="img-${i}"></div>
    </div>
  `;
  quiz.appendChild(card);
});

const imageCache = {};

async function fetchImage(wikiTitle) {
  if (imageCache[wikiTitle]) return imageCache[wikiTitle];
  try {
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const img = data.thumbnail?.source || data.originalimage?.source || null;
    imageCache[wikiTitle] = img;
    return img;
  } catch (e) {
    return null;
  }
}

async function reveal(i) {
  const answer = document.getElementById('answer-' + i);
  answer.classList.toggle('show');
  if (!answer.classList.contains('show')) return;

  const slot = document.getElementById('img-' + i);
  if (slot.dataset.loaded) return;
  slot.dataset.loaded = 'loading';
  slot.innerHTML = '<div class="loading">Loading picture...</div>';

  const imgUrl = await fetchImage(questions[i].wiki);
  if (imgUrl) {
    slot.innerHTML = `<img src="${imgUrl}" alt="${questions[i].answer}" loading="lazy"><div class="credit">Image: Wikipedia</div>`;
    slot.dataset.loaded = 'done';
  } else {
    slot.innerHTML = '<div class="credit">(No picture available)</div>';
    slot.dataset.loaded = 'failed';
  }
}
