function renderQuiz(containerId, questions, prefix) {
  const quiz = document.getElementById(containerId);
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="row">
        <div class="content">
          <span class="num">Q${i + 1}</span>
          <ul class="hints">
            <li>${q.hints[0]}</li>
            <li>${q.hints[1]}</li>
            <li>${q.hints[2]}</li>
          </ul>
        </div>
        <button onclick="reveal('${prefix}', ${i})">🔍 Reveal</button>
      </div>
      <div class="answer" id="${prefix}-answer-${i}">
        <div>It's a <span class="emoji">${q.answer}</span>!</div>
        <div class="cn">${q.cn}</div>
        <div class="image-slot" id="${prefix}-img-${i}"></div>
      </div>
    `;
    quiz.appendChild(card);
  });
}

renderQuiz('animals-quiz', animals, 'animal');

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

const imageCache = {};

async function fetchImage(wikiTitle) {
  if (imageCache[wikiTitle]) return imageCache[wikiTitle];
  try {
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wikiTitle)}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    const img = data.thumbnail?.source || data.originalimage?.source || null;
    imageCache[wikiTitle] = img;
    return img;
  } catch (e) {
    return null;
  }
}

async function reveal(prefix, i) {
  const questions = prefix === 'animal' ? animals : plants;
  const answer = document.getElementById(`${prefix}-answer-${i}`);
  answer.classList.toggle('show');
  if (!answer.classList.contains('show')) return;

  const slot = document.getElementById(`${prefix}-img-${i}`);
  if (slot.dataset.loaded) return;
  slot.dataset.loaded = 'loading';
  slot.innerHTML = '<div class="loading">Loading picture...</div>';

  const imgUrl = await fetchImage(questions[i].wiki);
  if (imgUrl) {
    slot.innerHTML = `<img src="${imgUrl}" alt="${questions[i].answer}" loading="lazy"><div class="credit">Image: Wikipedia</div>`;
    slot.dataset.loaded = 'done';
  } else {
    slot.innerHTML = '<div class="credit">(No picture available)</div>';
    slot.dataset.loaded = 'failed';
  }
}
